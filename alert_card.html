
        <!DOCTYPE html>
        <html lang="ko">
        <head>
            <meta charset="UTF-8">
            <script src="https://cdn.tailwindcss.com"></script>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
                body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; width: 320px; height: 150px; }
                .glass-card { width: 290px; height: 130px; background: linear-gradient(135deg, rgba(30, 41, 59, 1.0), rgba(15, 23, 42, 1.0)); border-radius: 20px; border: 1.2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 40px 80px rgba(0, 0, 0, 0.95); padding: 15px; display: flex; flex-direction: column; position: relative; overflow: hidden; }
                .glass-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px; background: linear-gradient(90deg, transparent, #fbbf24, transparent); }
            </style>
        </head>
        <body>
            <div class="glass-card">
                <div class="mb-1.5 border-b border-white/10 pb-1 flex justify-between items-baseline">
                    <div class="text-[#fbbf24] text-[16px] font-black tracking-tighter">정보자원 AI 일일 알리미</div>
                    <div class="text-[#38bdf8] text-[9px] font-bold tracking-widest opacity-80">2026-03-31</div>
                </div>
                <div class="flex-1 overflow-visible">
                <div class="flex items-start text-[12px] font-bold text-[#f8fafc] mb-1 leading-tight border-l-2 border-[#38bdf8]/50 pl-2.5">
                    <div class="flex-1 whitespace-normal break-words">오늘 예정된 주요 일정 및 작업은 없습니다.</div>
                </div>
                </div>
                <div class="pt-0.5 border-t border-white/5 flex flex-col items-center justify-center opacity-80">
                    <p class="text-[9px] font-bold text-[#64748b] leading-none mb-0.5">사업 완료일까지</p>
                    <p class="text-[15px] font-black text-[#f43f5e] tracking-tight leading-none italic">D-72</p>
                </div>
            </div>
        </body>
        </html>
